---
- name: Deploy and check lab4-service
  hosts: lab4
  become: yes
  tasks:
    - name: Install required packages
      apt:
        name:
          - git
          - curl
          - python3
          - python3-venv
        state: present
        update_cache: yes

    - name: Create service directory
      file:
        path: /opt/lab4-service/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy index.html
      copy:
        dest: /opt/lab4-service/html/index.html
        content: "<h1>Akutin</h1>\n"
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Copy service.sh
      copy:
        src: service.sh
        dest: /opt/lab4-service/service.sh
        owner: root
        group: root
        mode: '0755'
      notify: restart_service

    - name: Copy systemd unit file
      copy:
        src: lab4-service.service
        dest: /etc/systemd/system/lab4-service.service
        owner: root
        group: root
        mode: '0644'
      notify: reload_systemd

    - name: Enable and start lab4-service
      systemd:
        name: lab4-service
        daemon_reload: yes
        enabled: yes
        state: started

    - name: Healthcheck via URI module
      uri:
        url: http://127.0.0.1:8000/
        status_code: 200

  handlers:
    - name: reload_systemd
      systemd:
        daemon_reload: yes

    - name: restart_service
      systemd:
        name: lab4-service
        state: restarted
